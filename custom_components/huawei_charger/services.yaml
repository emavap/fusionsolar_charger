dump_config_signals:
  name: Dump Config Signals
  description: Refresh the Huawei charger config-signal catalog and write a filtered dump to the Home Assistant log.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. If omitted, the service dumps signals for all Huawei Charger entries.
      example: 1234567890abcdef1234567890abcdef
      selector:
        text:
    refresh:
      name: Refresh
      description: Refresh charger config signals before logging the dump.
      default: true
      selector:
        boolean:

set_config_signal:
  name: Set Config Signal
  description: Write a raw Huawei charger config signal through the FusionSolar cloud API. Useful for testing hidden start/stop candidates discovered by dump_config_signals.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Required if multiple Huawei Charger entries exist.
      example: 1234567890abcdef1234567890abcdef
      selector:
        text:
    param_id:
      name: Param ID
      description: Huawei config signal ID to write.
      example: 30001
      required: true
      selector:
        text:
    value:
      name: Value
      description: Value to write. Strings "true"/"false" and numeric text are coerced automatically.
      example: 1
      required: true
      selector:
        text:

start_charge:
  name: Start Charge
  description: Start charging through the FusionSolar charger session API.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Required if multiple Huawei Charger entries exist.
      example: 1234567890abcdef1234567890abcdef
      selector:
        text:
    gun_number:
      name: Gun Number
      description: Charger connector number. Defaults to 1.
      default: 1
      selector:
        number:
          min: 1
          max: 8
          mode: box
    account_id:
      name: Account ID
      description: Optional account ID override if your FusionSolar tenant requires it.
      example: 10000001
      selector:
        text:
    refresh:
      name: Refresh
      description: Refresh charger data after the action completes.
      default: true
      selector:
        boolean:

stop_charge:
  name: Stop Charge
  description: Stop charging through the FusionSolar charger session API.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. Required if multiple Huawei Charger entries exist.
      example: 1234567890abcdef1234567890abcdef
      selector:
        text:
    gun_number:
      name: Gun Number
      description: Charger connector number. Defaults to 1.
      default: 1
      selector:
        number:
          min: 1
          max: 8
          mode: box
    order_number:
      name: Order Number
      description: Optional active session order number. If omitted, the integration will try to resolve it from live charger process data.
      example: 1711917700123
      selector:
        text:
    serial_number:
      name: Serial Number
      description: Optional active session serial number. If omitted, the integration will try to resolve it from live charger process data.
      example: 123456789
      selector:
        text:
    refresh:
      name: Refresh
      description: Refresh charger data after the action completes.
      default: true
      selector:
        boolean:
