dump_config_signals:
  name: Dump Config Signals
  description: Refresh the Huawei charger config-signal catalog and write a filtered dump to the Home Assistant log.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. If omitted, the service dumps signals for all Huawei Charger entries.
      example: 1234567890abcdef1234567890abcdef
      selector:
        text:
    refresh:
      name: Refresh
      description: Refresh charger config signals before logging the dump.
      default: true
      selector:
        boolean:
